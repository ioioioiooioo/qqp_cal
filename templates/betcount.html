<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>注數計算機 - 香港賽馬過關</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .leg-card { transition: all 0.2s; }
        .leg-card:hover { box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        
        .play-btn {
            width: 52px !important;
            height: 52px !important;
            font-size: 0.95rem;
            font-weight: bold;
            margin: 3px;
            padding: 0;
            line-height: 1;
            border-radius: 8px;
        }
        .play-btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
        }

        .slider-container {
            position: relative;
            padding: 15px 0 25px 0;
        }
        .slider-ticks {
            display: flex;
            justify-content: space-between;
            position: absolute;
            width: 100%;
            bottom: 0;
            font-size: 0.75rem;
            color: #555;
            padding: 0 8px;
        }
        .mode-btn.active { background-color: #198754 !important; color: white !important; }
        .mode-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>🏇 注數計算機</h1>
            <a href="/" class="btn btn-outline-primary">← 返回派彩計算</a>
        </div>

        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4>過關注數計算器（支援多種 HKJC 玩法）</h4>
            </div>
            <div class="card-body">
                <div class="row mb-4">
                    <div class="col-md-3">
                        <label class="form-label fw-bold">過關關數</label>
                        <select id="numLegs" class="form-select form-select-lg" onchange="generateLegs()">
                            <option value="2">2 關過關</option>
                            <option value="3">3 關過關</option>
                            <option value="4" selected>4 關過關</option>
                            <option value="5">5 關過關</option>
                            <option value="6">6 關過關</option>
                        </select>
                    </div>
                </div>

                <div id="legsContainer" class="row"></div>

                <div class="mt-5 p-4 bg-light rounded-3 border">
                    <h3 class="text-center mb-3">計算結果</h3>
                    <div class="row text-center">
                        <div class="col-md-6">
                            <h4>總注數</h4>
                            <h2 id="totalBets" class="text-danger">0</h2>
                        </div>
                        <div class="col-md-6">
                            <h4>總金額 (每注 $10)</h4>
                            <h2 id="totalAmount" class="text-success">HK$0</h2>
                        </div>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <button onclick="copyBetSummary()" class="btn btn-lg btn-success">📋 複製投注摘要</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function generateLegs() {
            const num = parseInt(document.getElementById('numLegs').value);
            const container = document.getElementById('legsContainer');
            container.innerHTML = '';

            for (let i = 1; i <= num; i++) {
                const html = `
                    <div class="col-lg-6 col-xl-4 mb-4 leg-card">
                        <div class="card h-100">
                            <div class="card-header bg-primary text-white">
                                <span id="leg-title-${i}">第 ${i} 關</span>
                            </div>
                            <div class="card-body">
                                <!-- 玩法按鈕 -->
                                <div class="mb-3">
                                    <label class="form-label">玩法</label>
                                    <div class="play-btn-group">
                                        <button type="button" class="btn btn-outline-primary play-btn" data-type="win" onclick="selectPlay(this, ${i})">W</button>
                                        <button type="button" class="btn btn-outline-primary play-btn" data-type="place" onclick="selectPlay(this, ${i})">P</button>
                                        <button type="button" class="btn btn-outline-primary play-btn" data-type="winplace" onclick="selectPlay(this, ${i})">W+P</button>
                                        <button type="button" class="btn btn-outline-primary play-btn active" data-type="trio" onclick="selectPlay(this, ${i})">T</button>
                                        <button type="button" class="btn btn-outline-primary play-btn" data-type="quinella" onclick="selectPlay(this, ${i})">Q</button>
                                        <button type="button" class="btn btn-outline-primary play-btn" data-type="placeq" onclick="selectPlay(this, ${i})">QP</button>
                                        <button type="button" class="btn btn-outline-primary play-btn" data-type="quinella_placeq" onclick="selectPlay(this, ${i})">Q+QP</button>
                                    </div>
                                </div>

                                <!-- 馬匹數量 Slider -->
                                <div class="mb-3">
                                    <label class="form-label d-flex justify-content-between">
                                        馬匹數量 <span id="horses-value-${i}" class="text-primary fw-bold">5</span>
                                    </label>
                                    <input type="range" class="form-range leg-horses" id="horses-${i}" 
                                           min="1" max="20" value="5" step="1" 
                                           oninput="updateHorseValue(${i}); calculateTotalBets()">
                                    <div class="slider-ticks">
                                        <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
                                        <span>8</span><span>12</span><span>16</span><span>20</span>
                                    </div>
                                </div>

                                <!-- 投注模式 -->
                                <div class="mb-3">
                                    <label class="form-label">投注模式</label>
                                    <div class="btn-group w-100" role="group">
                                        <button type="button" class="btn btn-outline-success mode-btn flex-fill active" 
                                                data-mode="complex" onclick="selectMode(this, ${i})">複式</button>
                                        <button type="button" class="btn btn-outline-success mode-btn flex-fill" 
                                                data-mode="banker" onclick="selectMode(this, ${i})">1膽拖</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>`;
                container.innerHTML += html;
            }

            // 初始化
            setTimeout(() => {
                document.querySelectorAll('.leg-card').forEach((leg, idx) => {
                    const slider = leg.querySelector('.leg-horses');
                    if (slider) {
                        slider.value = 20;
                        slider.dataset.horses = 5;
                        document.getElementById(`horses-value-${idx+1}`).textContent = 5;
                    }
                    const defaultBtn = leg.querySelector('[data-type="trio"]');
                    if (defaultBtn) selectPlay(defaultBtn, idx + 1);
                });
                calculateTotalBets();
            }, 50);
        }

        function selectPlay(btn, legNum) {
            const group = btn.closest('.play-btn-group');
            group.querySelectorAll('.play-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const fullName = {
                win: "獨贏", place: "位置", winplace: "獨贏 + 位置",
                trio: "單T", quinella: "連贏", placeq: "位置Q",
                quinella_placeq: "連贏 + 位置Q"
            };
            document.getElementById(`leg-title-${legNum}`).innerHTML = 
                `第 ${legNum} 關 - <strong>${fullName[btn.dataset.type]}</strong>`;

            const modeBtns = btn.closest('.card-body').querySelectorAll('.mode-btn');
            const isForceComplex = ['win','place','winplace'].includes(btn.dataset.type);
            
            modeBtns.forEach(b => {
                if (isForceComplex) {
                    if (b.dataset.mode === 'complex') b.classList.add('active');
                    else b.classList.remove('active');
                    b.disabled = b.dataset.mode !== 'complex';
                } else {
                    b.disabled = false;
                }
            });

            calculateTotalBets();
        }

        function selectMode(btn, legNum) {
            const group = btn.parentElement;
            group.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            calculateTotalBets();
        }

        function updateHorseValue(legNum) {
            const value = document.getElementById(`horses-${legNum}`).value;
            document.getElementById(`horses-value-${legNum}`).textContent = value;
            calculateTotalBets();
        }

        function calculateTotalBets() {
            let total = 1;
            const legs = document.querySelectorAll('.leg-card');

            legs.forEach(leg => {
                const typeBtn = leg.querySelector('.play-btn.active');
                const type = typeBtn ? typeBtn.dataset.type : 'trio';
                const horses = parseInt(leg.querySelector('.leg-horses').dataset.horses) || parseInt(leg.querySelector('.leg-horses').value) || 5;
                const modeBtn = leg.querySelector('.mode-btn.active');
                const mode = modeBtn ? modeBtn.dataset.mode : 'complex';

                let bets = 0;
                if (mode === 'complex' || ['win','place','winplace'].includes(type)) {
                    switch(type) {
                        case 'win': bets = horses; break;
                        case 'place': bets = horses; break;
                        case 'winplace': bets = horses * 2; break;
                        case 'trio': bets = horses >= 3 ? Math.floor(horses*(horses-1)*(horses-2)/6) : 0; break;
                        case 'quinella': bets = horses >= 2 ? Math.floor(horses*(horses-1)/2) : 0; break;
                        case 'placeq': bets = horses >= 2 ? Math.floor(horses*(horses-1)/2) : 0; break;
                        case 'quinella_placeq': bets = (horses >= 2 ? Math.floor(horses*(horses-1)/2) : 0) * 2; break;
                    }
                } else {
                    const feet = horses - 1;
                    switch(type) {
                        case 'trio': bets = feet >= 2 ? Math.floor(feet*(feet-1)/2) : 0; break;
                        case 'quinella': bets = feet; break;
                        case 'placeq': bets = feet; break;
                        case 'quinella_placeq': bets = feet * 2; break;
                    }
                }
                total *= Math.max(bets, 1);
            });

            document.getElementById('totalBets').textContent = total.toLocaleString('zh-HK');
            document.getElementById('totalAmount').textContent = `HK$${(total * 10).toLocaleString('zh-HK')}`;
        }

        function copyBetSummary() {
            const legsNum = parseInt(document.getElementById('numLegs').value);
            const totalBets = document.getElementById('totalBets').textContent.replace(/,/g, '');
            let summary = `【注數計算結果】\n過關：${legsNum} 關\n\n`;

            const legs = document.querySelectorAll('.leg-card');
            legs.forEach((leg, index) => {
                const legNum = index + 1;
                const typeBtn = leg.querySelector('.play-btn.active');
                const type = typeBtn ? typeBtn.dataset.type : 'trio';
                
                const slider = leg.querySelector('.leg-horses');
                let horses = 5;
                if (slider) {
                    horses = parseInt(slider.dataset.horses) || parseInt(slider.value) || 5;
                }
                
                const modeBtn = leg.querySelector('.mode-btn.active');
                const mode = (modeBtn && modeBtn.dataset.mode === 'banker') ? '1膽拖' : '複式';

                const fullName = {
                    win: "獨贏", place: "位置", winplace: "獨贏 + 位置",
                    trio: "單T", quinella: "連贏", placeq: "位置Q",
                    quinella_placeq: "連贏 + 位置Q"
                };

                let legBets = 0;
                const isComplex = mode === '複式' || ['win','place','winplace'].includes(type);
                
                if (isComplex) {
                    switch(type) {
                        case 'win': legBets = horses; break;
                        case 'place': legBets = horses; break;
                        case 'winplace': legBets = horses * 2; break;
                        case 'trio': legBets = horses >= 3 ? Math.floor(horses*(horses-1)*(horses-2)/6) : 0; break;
                        case 'quinella': legBets = horses >= 2 ? Math.floor(horses*(horses-1)/2) : 0; break;
                        case 'placeq': legBets = horses >= 2 ? Math.floor(horses*(horses-1)/2) : 0; break;
                        case 'quinella_placeq': legBets = (horses >= 2 ? Math.floor(horses*(horses-1)/2) : 0) * 2; break;
                    }
                } else {
                    const feet = horses - 1;
                    switch(type) {
                        case 'trio': legBets = feet >= 2 ? Math.floor(feet*(feet-1)/2) : 0; break;
                        case 'quinella': legBets = feet; break;
                        case 'placeq': legBets = feet; break;
                        case 'quinella_placeq': legBets = feet * 2; break;
                    }
                }

                summary += `第${legNum}關 - ${fullName[type]} ${horses}匹${mode} ${legBets}注\n`;
            });

            summary += `\n總注數：${parseInt(totalBets).toLocaleString('zh-HK')} 注\n`;
            summary += `總金額（$10/注）：HK$${(parseInt(totalBets)*10).toLocaleString('zh-HK')}\n\n`;
            summary += `理性投注，祝好運！\n`;
            summary += `數據只供參考，請自行驗證計算結果!`;

            navigator.clipboard.writeText(summary).then(() => {
                alert('✅ 已複製詳細結果到剪貼簿！');
            });
        }

        window.onload = generateLegs;
    </script>
</body>
</html>
